name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install system audio libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y libportaudio2

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Sync dependencies (locked toolchain)
      run: uv sync --all-extras --python ${{ matrix.python-version }}

    - name: Lint with ruff
      run: uv run ruff check src tests

    - name: Type check with mypy
      run: uv run mypy src/audx

    - name: Test with pytest + coverage
      run: |
        uv run coverage run -m pytest -q
        uv run coverage report --fail-under=40
        uv run coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false

  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Regenerate golden-vector fixtures from the real parser
      run: uv run python scripts/gen_web_fixtures.py

    - name: Fail if committed fixtures drifted
      run: git diff --exit-code web/fixtures

    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install web deps
      run: npm ci
      working-directory: web

    - name: Typecheck (tsc)
      run: npm run typecheck
      working-directory: web

    - name: Parity tests (vitest)
      run: npm test
      working-directory: web

    - name: Build studio bundle
      run: npm run build
      working-directory: web
